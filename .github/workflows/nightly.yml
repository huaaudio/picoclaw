name: Nightly Build

on:
  schedule:
    - cron: '0 2 * * *'  # Daily at 2 AM UTC
  workflow_dispatch:      # Allow manual trigger

jobs:
  nightly:
    name: Nightly Build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Go
        id: setup-go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Set nightly tag
        id: tag
        run: |
          NIGHTLY_TAG="nightly-$(date +%Y%m%d)"
          echo "tag=$NIGHTLY_TAG" >> $GITHUB_OUTPUT

      - name: Create/Update nightly tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Force update existing tag or create new one
          if git rev-parse "${{ steps.tag.outputs.tag }}" >/dev/null 2>&1; then
            echo "Tag exists, updating..."
            git tag -d "${{ steps.tag.outputs.tag }}"
          fi
          git tag -a "${{ steps.tag.outputs.tag }}" -m "Nightly build - $(date +%Y-%m-%d)"
          git push -f origin "${{ steps.tag.outputs.tag }}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        if: ${{ vars.DOCKERHUB_REPOSITORY != '' }}
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Run GoReleaser (snapshot mode)
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: ~> v2
          args: release --clean --snapshot
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
          DOCKERHUB_IMAGE_NAME: ${{ vars.DOCKERHUB_REPOSITORY }}
          GOVERSION: ${{ steps.setup-go.outputs.go-version }}
          NIGHTLY_TAG: ${{ steps.tag.outputs.tag }}

      - name: Build and push nightly Docker images
        run: |
          # Build minimal image
          docker compose -f docker/docker-compose.yml build picoclaw-agent picoclaw-gateway
          docker compose -f docker/docker-compose.yml push picoclaw-agent picoclaw-gateway || echo "Push failed, skipping..."

          # Tag with nightly date
          NIGHTLY_DATE=$(date +%Y%m%d)
          docker tag ghcr.io/${{ github.repository_owner }}/picoclaw:latest ghcr.io/${{ github.repository_owner }}/picoclaw:nightly
          docker tag ghcr.io/${{ github.repository_owner }}/picoclaw:latest ghcr.io/${{ github.repository_owner }}/picoclaw:nightly-${NIGHTLY_DATE}
          docker push ghcr.io/${{ github.repository_owner }}/picoclaw:nightly || echo "Push failed, skipping..."
          docker push ghcr.io/${{ github.repository_owner }}/picoclaw:nightly-${NIGHTLY_DATE} || echo "Push failed, skipping..."

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nightly-artifacts-${{ steps.tag.outputs.tag }}
          path: dist/
          retention-days: 30

      - name: Clean old nightly releases
        run: |
          echo "Cleaning old nightly releases..."
          # Get list of nightly releases older than 30 days
          gh release list \
            --query "[starts_with(name, 'nightly-')] | sort_by(.createdAt) | [0:-30].[].name" \
            --json name,createdAt \
            -t '{{ range . }}{{ .name }}{{ "\n" }}{{ end }}' \
            | while read tag; do
                if [ -n "$tag" ]; then
                  echo "Deleting release: $tag"
                  gh release delete "$tag" --yes || echo "Failed to delete $tag"
                fi
              done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create nightly release
        run: |
          NIGHTLY_TAG="${{ steps.tag.outputs.tag }}"
          NIGHTLY_DATE=$(date +%Y-%m-%d)

          # Check if release exists
          if gh release view "$NIGHTLY_TAG" >/dev/null 2>&1; then
            echo "Release exists, updating..."
            gh release upload "$NIGHTLY_TAG" dist/**/* --clobber || echo "Upload failed"
          else
            echo "Creating new release..."
            gh release create "$NIGHTLY_TAG" \
              --title "Nightly Build - $NIGHTLY_DATE" \
              --notes "Automated nightly build from main branch.

**Date**: $NIGHTLY_DATE
**Commit**: $(git rev-parse --short HEAD)

This is a pre-release nightly build for testing purposes. Use at your own risk.

For stable releases, see: https://github.com/${{ github.repository }}/releases" \
              --prerelease \
              --latest=false
            gh release upload "$NIGHTLY_TAG" dist/**/* || echo "Upload failed"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Nightly build failed. Check logs for details."
          # Could add Slack/Discord notification here
